<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0d0e12" />
    <title>Calorie Tracker</title>

    <!-- Splash screen styles — inline so they render before any JS or web font loads -->
    <style>
      @keyframes ct-breathe {
        0%, 100% { transform: scale(1);    opacity: 0.90; }
        50%       { transform: scale(1.05); opacity: 1;    }
      }
      @keyframes ct-shimmer {
        0%   { background-position: -240% center; }
        100% { background-position:  240% center; }
      }
      @keyframes ct-dot {
        0%, 80%, 100% { opacity: 0.18; transform: scale(0.8); }
        40%           { opacity: 1;    transform: scale(1);   }
      }

      #ct-splash {
        position: fixed; inset: 0; z-index: 9999;
        background: radial-gradient(ellipse 1400px 700px at 75% -5%, #1a2130 0%, #0d0e12 60%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        transition: opacity 0.45s ease;
        pointer-events: none;
      }
      #ct-splash-icon {
        width: 148px; height: 148px;
        border-radius: 33px;
        box-shadow: 0 24px 64px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.06);
        animation: ct-breathe 2.8s ease-in-out infinite;
        margin-bottom: 38px;
        display: block;
      }
      #ct-splash-label {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
        font-size: 11px; font-weight: 600; letter-spacing: .22em; text-transform: uppercase;
        background: linear-gradient(90deg, #3a404e 0%, #6b7280 30%, #c0c6d0 50%, #6b7280 70%, #3a404e 100%);
        background-size: 240% auto;
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: ct-shimmer 2.4s linear infinite;
        margin-bottom: 20px;
      }
      #ct-splash-dots {
        display: flex; gap: 7px; align-items: center;
      }
      #ct-splash-dots span {
        width: 5px; height: 5px; border-radius: 50%;
        background: #D94545;
        animation: ct-dot 1.5s ease-in-out infinite;
        display: inline-block;
      }
      #ct-splash-dots span:nth-child(2) { animation-delay: 0.22s; }
      #ct-splash-dots span:nth-child(3) { animation-delay: 0.44s; }
    </style>
  </head>
  <body>

    <!-- Splash: visible immediately, before any JS executes.
         React dismisses it with a fade after first mount. -->
    <div id="ct-splash">
      <img id="ct-splash-icon" src="./icon.png" alt="" />
      <div id="ct-splash-label">Loading</div>
      <div id="ct-splash-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
